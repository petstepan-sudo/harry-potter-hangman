# Nasazení na GitHub Pages s injektovanými tajemstvími (nejsou v gitu).
# V repozitáři: Settings → Secrets and variables → Actions → New repository secret:
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
# Settings → Pages → Build: GitHub Actions

name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Pokud je stránka na https://user.github.io/NAZEV-REPA/, odkomentujte a upravte:
          # VITE_BASE_PATH: /NAZEV-REPA/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
